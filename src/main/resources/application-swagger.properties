# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true

# Customization
springdoc.swagger-ui.title=Ticket Booking API
springdoc.swagger-ui.description=API documentation for the Ticket Booking application
springdoc.swagger-ui.version=1.0

# Security
springdoc.swagger-ui.oauth2-client-id=swagger-ui
springdoc.swagger-ui.oauth2-redirect-url=http://localhost:8080/swagger-ui/oauth2-redirect.html

# OpenAPI Info
springdoc.info.title=Ticket Booking API
springdoc.info.description=API documentation for the Ticket Booking application
springdoc.info.version=1.0
springdoc.info.license.name=MIT License
springdoc.info.license.url=https://opensource.org/licenses/MIT
springdoc.info.contact.name=Ticket Booking Team
springdoc.info.contact.url=https://github.com/your-organization/ticket-booking
springdoc.info.contact.email=contact@ticketbooking.com